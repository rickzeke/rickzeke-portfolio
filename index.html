<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RickZeke — AI产品组合</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--bg2:#0e0e18;--bg3:#15151f;--card:#1c1c28;--border:rgba(255,255,255,0.06);--accent:#ff4d4d;--accent2:#ff9f43;--accent3:#4dffb4;--text:#f8f9fc;--text2:#94a3b8;--text3:#64748b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:60px 24px 100px}
header{text-align:center;margin-bottom:64px}
header h1{font-size:clamp(36px,6vw,56px);font-weight:900;background:linear-gradient(135deg,#ff4d4d,#ff9f43);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
header p{color:var(--text2);font-size:16px;max-width:500px;margin:0 auto}
.stats{display:flex;justify-content:center;gap:32px;margin-top:32px;flex-wrap:wrap}
.stat{text-align:center}
.stat .num{font-size:36px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat .label{color:var(--text3);font-size:12px;margin-top:4px}
.section-title{font-size:14px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:4px;height:16px;background:var(--accent);border-radius:2px}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-bottom:60px}
.product{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;transition:all .25s;cursor:pointer;position:relative;overflow:hidden}
.product::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity .25s}
.product:hover{transform:translateY(-4px);border-color:rgba(255,77,77,0.2);box-shadow:0 16px 48px rgba(0,0,0,0.4)}
.product:hover::before{opacity:1}
.product-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.product-icon{font-size:28px;line-height:1}
.product-badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;display:flex;align-items:center;gap:4px}
.badge-new{background:rgba(255,77,77,0.15);color:var(--accent);border:1px solid rgba(255,77,77,0.3)}
.badge-live{background:rgba(77,255,180,0.1);color:var(--accent3);border:1px solid rgba(77,255,180,0.3)}
.product-name{font-size:16px;font-weight:700;margin-bottom:6px}
.product-desc{color:var(--text2);font-size:13px;line-height:1.6;margin-bottom:16px}
.product-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{background:var(--bg3);padding:3px 8px;border-radius:6px;font-size:11px;color:var(--text3)}
.product-url{color:var(--text3);font-size:11px;display:flex;align-items:center;gap:4px;margin-top:12px}
.heartbeat-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:16px}
.heartbeat-fill{height:100%;width:100%;background:linear-gradient(90deg,var(--accent3),#4dffff);border-radius:2px;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.footer{text-align:center;padding:40px 0;color:var(--text3);font-size:13px}
.footer a{color:var(--accent);text-decoration:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.product{animation:fadeIn .4s ease both}
.products .product:nth-child(1){animation-delay:.03s}.products .product:nth-child(2){animation-delay:.06s}.products .product:nth-child(3){animation-delay:.09s}.products .product:nth-child(4){animation-delay:.12s}.products .product:nth-child(5){animation-delay:.15s}.products .product:nth-child(6){animation-delay:.18s}.products .product:nth-child(7){animation-delay:.21s}.products .product:nth-child(8){animation-delay:.24s}.products .product:nth-child(9){animation-delay:.27s}.products .product:nth-child(10){animation-delay:.3s}.products .product:nth-child(11){animation-delay:.33s}.products .product:nth-child(12){animation-delay:.36s}.products .product:nth-child(13){animation-delay:.39s}.products .product:nth-child(14){animation-delay:.42s}.products .product:nth-child(15){animation-delay:.45s}.products .product:nth-child(16){animation-delay:.48s}.products .product:nth-child(17){animation-delay:.51s}
@media(max-width:600px){.container{padding:40px 16px 60px}.stats{gap:20px}}
</style>
</head>
<body>
<div class="container">
<header>
<h1>⚡ RickZeke 产品组合</h1>
<p>AI驱动的微型产品组合，持续构建、持续部署、持续迭代</p>
<div class="stats">
<div class="stat"><div class="num" id="count-live">17</div><div class="label">已上线产品</div></div>
<div class="stat"><div class="num" id="count-healthy">17</div><div class="label">健康运行中</div></div>
<div class="stat"><div class="num" id="count-dev">2</div><div class="label">开发中</div></div>
</div>
</header>

<div class="section-title">🚀 已上线产品</div>
<div class="products" id="products-live"></div>

<div class="section-title">🛠️ 开发中</div>
<div class="products" id="products-dev"></div>

<div style="text-align:center;padding:48px 0 24px;border-top:1px solid var(--border);margin-top:48px">
<a href="mailto:rickzeke@example.com?subject=产品组合反馈" style="display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:linear-gradient(135deg,#ff4d4d,#ff9f43);color:white;text-decoration:none;border-radius:30px;font-size:15px;font-weight:600;box-shadow:0 4px 24px rgba(255,77,77,0.2)">📧 发送产品反馈</a>
<p style="color:var(--text3);font-size:12px;margin-top:16px">问题、建议或合作都欢迎联系</p>
</div>
<div class="footer">
<p>健康监控：<a href="https://github.com/rickzeke/product-health-monitor" target="_blank">product-health-monitor</a> · 每小时自动检测</p>
<p style="margin-top:8px">部署平台：GitHub Pages · 自动构建：GitHub Actions</p>
</div>
</div>

<script>
const PRODUCTS = [
{name:'InterviewPro AI面试',icon:'🎯',desc:'4大场景、难度选择、即时反馈评分、语音识别，模拟真实面试',url:'https://rickzeke.github.io/ai-conversation-coach-web/',tags:['AI','面试','职场'],new:true,category:'education'},
{name:'VoiceCraft AI语音',icon:'🔊',desc:'Web Speech API语音合成、语音选择、语速/音调调节、波形动画',url:'https://rickzeke.github.io/ai-tts-tool-web/',tags:['AI','TTS','语音'],new:true,category:'efficiency'},
{name:'AI视频高光剪辑',icon:'✂️',desc:'长视频一键提取高光、标记片段、导出分享。抖音/小红书/快手',url:'https://rickzeke.github.io/video-highlight-tool-web/',tags:['AI','视频','剪辑'],new:true,category:'efficiency'},
{name:'秒转',icon:'🎬',desc:'短视频链接 → 多平台内容，一键生成。抖音/小红书/视频号',url:'https://rickzeke.github.io/miaozhuan-web/',tags:['AI','内容创作','效率'],new:false,category:'efficiency'},
{name:'AI提示词管理器',icon:'💎',desc:'分类管理、一键复制、智能搜索。专业AI提示词库',url:'https://rickzeke.github.io/ai-productivity-web/',tags:['AI','效率'],new:false,category:'efficiency'},
{name:'AI提示词优化',icon:'✨',desc:'6大职业场景，18个模板，AI一键优化提示词',url:'https://rickzeke.github.io/ai-prompt-pro-web/',tags:['AI','效率','职业'],new:false,category:'efficiency'},
{name:'内容多平台发布',icon:'📡',desc:'AI润色、多平台预览、一键复制。支持微信公众号/微博/小红书',url:'https://rickzeke.github.io/multi-platform-publisher-web/',tags:['效率','创作者','多平台'],new:false,category:'efficiency'},
{name:'歌词卡拉OK',icon:'🎤',desc:'LRC解析、逐行同步、极光动画。在线歌词同步播放器',url:'https://rickzeke.github.io/lyrics-sync-web/',tags:['音乐','娱乐','工具'],new:false,category:'entertainment'},
{name:'AI英语口语陪练',icon:'🗣️',desc:'6大场景AI对话，智能提示词汇，沉浸式英语学习',url:'https://rickzeke.github.io/ai-english-web/',tags:['AI','教育','英语'],new:false,category:'education'},
{name:'真心话大冒险',icon:'🎲',desc:'多人社交游戏，随机挑战题目，微信/抖音分享',url:'https://rickzeke.github.io/social-game-web/',tags:['游戏','社交','休闲'],new:false,category:'entertainment'},
{name:'AI生活模拟器',icon:'🏠',desc:'租房奇遇 + 职场修炼双剧情，AI生成剧情，体验不同人生',url:'https://rickzeke.github.io/ai-life-simulator-web/',tags:['AI','游戏','模拟'],new:false,category:'entertainment'},
{name:'AI运动视频高光',icon:'🏃',desc:'视频上传、标记高光、AI识别瞬间、导出分享卡片',url:'https://rickzeke.github.io/ai-sports-video-web/',tags:['AI','运动','视频'],new:true,category:'efficiency'},
{name:'AI广告视频生成器',icon:'🎬',desc:'5行业模板、AI文案生成、一键导出广告卡',url:'https://rickzeke.github.io/ai-video-ad-web/',tags:['AI','广告','抖音'],new:true,category:'efficiency'},
{name:'社交约伴App',icon:'👫',desc:'MBTI人格测试、活动匹配、Z世代社交发现',url:'https://rickzeke.github.io/social-finder-web/',tags:['社交','Z世代','约伴'],new:true,category:'social'},
{name:'AI API聚合器',icon:'⚡',desc:'百度/字节/智谱/腾讯多平台API聚合、成本监控、模型对比',url:'https://rickzeke.github.io/ai-api-aggregator-web/',tags:['AI','开发者工具','API'],new:false,category:'efficiency'},
{name:'男性健康追踪',icon:'💪',desc:'每日签到、5维雷达图、AI健康建议、睾酮指数估算',url:'https://rickzeke.github.io/mens-health-tracker-web/',tags:['健康','AI','追踪'],new:true,category:'health'},
{name:'匿名社交坦白局',icon:'🎭',desc:'AI生成坦白问题、匿名回答、Canvas分享、坦白等级',url:'https://rickzeke.github.io/anonymous-confession-web/',tags:['社交','匿名','坦白'],new:true,category:'social'},
];

const DEV_PRODUCTS = [
{name:'本地商家建站',icon:'🏪',desc:'AI自动生成商家认领页，多平台分发',tags:['工具','本地商家','建站'],category:'efficiency'},
{name:'SLG重度小游戏',icon:'🎮',desc:'策略游戏，内购变现，微信IAP小游戏激励',tags:['游戏','SLG','重度'],category:'entertainment'},
];

function renderProducts(list, container, isLive) {
  container.innerHTML = '';
  list.forEach(p => {
    const div = document.createElement('div');
    div.className = 'product';
    div.onclick = () => window.open(p.url, '_blank');
    const badge = p.new ? '<span class="product-badge badge-new">✨ 新上线</span>' : (isLive ? '<span class="product-badge badge-live">● 运行中</span>' : '<span class="product-badge" style="background:rgba(255,159,67,0.1);color:var(--accent2);border:1px solid rgba(255,159,67,0.3)">🛠️ 开发中</span>');
    const tags = p.tags.map(t => `<span class="tag">${t}</span>`).join('');
    div.innerHTML = `<div class="product-header"><span class="product-icon">${p.icon}</span>${badge}</div><div class="product-name">${p.name}</div><div class="product-desc">${p.desc}</div><div class="product-tags">${tags}</div>${isLive?'<div class="product-url">🔗 ' + p.url.replace('https://','') + '</div><div class="heartbeat-bar"><div class="heartbeat-fill"></div></div>':''}`;
    container.appendChild(div);
  });
}

renderProducts(PRODUCTS, document.getElementById('products-live'), true);
renderProducts(DEV_PRODUCTS, document.getElementById('products-dev'), false);
</script>
</body>
</html>
